spring.application.name=wedding-backend

spring.datasource.url=jdbc:h2:mem:weddingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

server.address=0.0.0.0
server.port=8080

wechat.app-id=${WECHAT_APP_ID:}
wechat.app-secret=${WECHAT_APP_SECRET:}
wechat.share-title=${WECHAT_SHARE_TITLE:何建峰 & 周婉情答谢宴邀请函}
wechat.share-description=${WECHAT_SHARE_DESCRIPTION:诚邀您参加我们的婚礼答谢宴，点击查看详情并回复出席信息。}
wechat.share-link=${WECHAT_SHARE_LINK:}
wechat.share-image-url=${WECHAT_SHARE_IMAGE_URL:}
