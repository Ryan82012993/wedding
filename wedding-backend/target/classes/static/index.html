<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Material-UI -->
    <script src="https://unpkg.com/@mui/material@5.15.15/umd/material-ui.production.min.js"></script>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fdfbf7;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const {
            Container,
            Typography,
            TextField,
            Button,
            Paper,
            Box,
            Snackbar,
            Alert,
            ThemeProvider,
            createTheme
        } = MaterialUI;

        const theme = createTheme({
            palette: {
                primary: {
                    main: '#d4af37', // Gold
                },
                secondary: {
                    main: '#f48fb1', // Pink
                },
            },
        });

        function App() {
            const [name, setName] = React.useState('');
            const [guests, setGuests] = React.useState('');
            const [open, setOpen] = React.useState(false);
            const [message, setMessage] = React.useState('');
            const [severity, setSeverity] = React.useState('success');

            const handleSubmit = async (e) => {
                e.preventDefault();
                try {
                    const response = await fetch('/api/rsvps', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            name: name,
                            numberOfGuests: parseInt(guests, 10)
                        }),
                    });

                    if (response.ok) {
                        setMessage('期待您的到来！');
                        setSeverity('success');
                        setName('');
                        setGuests('');
                    } else {
                        setMessage('提交失败，请稍后再试。');
                        setSeverity('error');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    setMessage('网络错误，请检查后端是否启动。');
                    setSeverity('error');
                }
                setOpen(true);
            };

            const handleClose = (event, reason) => {
                if (reason === 'clickaway') {
                    return;
                }
                setOpen(false);
            };

            return (
                <ThemeProvider theme={theme}>
                    <Container maxWidth="sm">
                        <Paper elevation={3} sx={{ p: 4, textAlign: 'center', borderRadius: 4 }}>
                            <Typography variant="h3" component="h1" gutterBottom sx={{ fontFamily: 'serif', color: '#333' }}>
                                婚礼邀请函
                            </Typography>
                            <Typography variant="subtitle1" gutterBottom sx={{ mb: 4, color: '#666' }}>
                                诚挚邀请您参加我们的婚礼
                            </Typography>

                            <Box component="form" onSubmit={handleSubmit} sx={{ mt: 2 }}>
                                <TextField
                                    fullWidth
                                    label="您的姓名"
                                    variant="outlined"
                                    margin="normal"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    required
                                />
                                <TextField
                                    fullWidth
                                    label="出席人数"
                                    type="number"
                                    variant="outlined"
                                    margin="normal"
                                    value={guests}
                                    onChange={(e) => setGuests(e.target.value)}
                                    required
                                    InputProps={{ inputProps: { min: 1 } }}
                                />
                                <Button
                                    type="submit"
                                    fullWidth
                                    variant="contained"
                                    color="primary"
                                    size="large"
                                    sx={{ mt: 3, mb: 2, py: 1.5 }}
                                >
                                    确认出席
                                </Button>
                            </Box>
                        </Paper>

                        <Snackbar open={open} autoHideDuration={6000} onClose={handleClose}>
                            <Alert onClose={handleClose} severity={severity} sx={{ width: '100%' }}>
                                {message}
                            </Alert>
                        </Snackbar>
                    </Container>
                </ThemeProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
